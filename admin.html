<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Au Pestacle ce soir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #6e46ff;
      --accent-dark: #5030e0;
      --noir: #0A0A0A;
      --gris: #666;
      --gris-border: #E0E0E0;
      --blanc: #FFF;
      --bg: #F5F5F5;
      --rouge: #FF3C3C;
      --vert: #22C55E;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--noir); line-height: 1.5; }
    a { color: inherit; text-decoration: none; }

    /* ── LOGIN ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--noir);
    }
    .login-box {
      background: var(--blanc);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--gris);
      text-transform: lowercase;
      margin-bottom: 32px;
    }
    .login-logo em { color: var(--accent); font-style: normal; }
    .login-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
      margin-bottom: 8px;
    }
    .login-sub { font-size: 0.88rem; color: var(--gris); margin-bottom: 32px; }
    .login-box input {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid var(--gris-border);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: var(--blanc);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-box button:hover { background: var(--accent-dark); }
    .login-error { color: var(--rouge); font-size: 0.82rem; margin-top: 10px; display: none; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; min-height: 100vh; }

    /* Topbar */
    .topbar {
      background: var(--accent);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar__logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--blanc);
      text-transform: lowercase;
    }
    .topbar__right { display: flex; align-items: center; gap: 16px; }
    .topbar__badge {
      background: rgba(255,255,255,0.2);
      color: var(--blanc);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 4px 10px;
    }
    .topbar__logout {
      background: var(--blanc);
      color: var(--accent);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .topbar__logout:hover { background: var(--noir); color: var(--blanc); }

    /* Main content */
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }
    .main__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--noir);
    }
    .main__title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.8rem;
    }
    .main__count { font-size: 0.82rem; color: var(--gris); margin-top: 4px; }

    /* Bouton ajouter */
    .btn-add {
      background: var(--accent);
      color: var(--blanc);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 11px 22px;
      cursor: pointer;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-add:hover { background: var(--accent-dark); }

    /* Tableau des spectacles */
    .table-wrap { background: var(--blanc); border: 1px solid var(--gris-border); overflow: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--noir);
      color: var(--blanc);
      font-family: 'Syne', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 16px;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--gris-border); transition: background 0.15s; }
    tbody tr:hover { background: #FAFAFA; }
    tbody td { padding: 14px 16px; font-size: 0.88rem; vertical-align: middle; }
    .td-emoji { font-size: 1.5rem; text-align: center; width: 48px; }
    .td-titre { font-family: 'Syne', sans-serif; font-weight: 700; }
    .td-lieu  { color: var(--gris); font-size: 0.82rem; }
    .td-note  { font-size: 0.85rem; color: var(--accent); font-weight: 700; }
    .td-cats  { display: flex; flex-wrap: wrap; gap: 4px; }
    .cat-pill {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 8px;
      border: 1.5px solid currentColor;
      white-space: nowrap;
    }
    .cat-pill--rire      { color: #C00; }
    .cat-pill--reflechir { color: var(--accent); }
    .cat-pill--famille   { color: #8A7200; }
    .cat-pill--danse     { color: #0A7A4A; }
    .cat-pill--amis      { color: var(--noir); }
    .cat-pill--coeur     { color: var(--accent); }
    .td-statut { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .td-statut--actif  { color: var(--vert); }
    .td-statut--inactif { color: var(--gris); }
    .td-actions { display: flex; gap: 8px; }
    .btn-edit, .btn-delete {
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-edit   { background: var(--noir); color: var(--blanc); }
    .btn-edit:hover { background: #333; }
    .btn-delete { background: transparent; color: var(--rouge); border: 1.5px solid var(--rouge); }
    .btn-delete:hover { background: var(--rouge); color: var(--blanc); }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      overflow-y: auto;
      padding: 32px 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--blanc);
      width: 100%;
      max-width: 680px;
      padding: 36px 36px 40px;
      position: relative;
    }
    .modal__title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--noir);
    }
    .modal__close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--gris);
      line-height: 1;
      padding: 4px 8px;
    }
    .modal__close:hover { color: var(--noir); }

    /* Formulaire */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 20px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group--full { grid-column: 1 / -1; }
    label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--noir);
    }
    input[type=text], input[type=url], textarea, select {
      padding: 10px 14px;
      border: 2px solid var(--gris-border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--noir);
      outline: none;
      transition: border-color 0.2s;
      background: var(--blanc);
      width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 90px; }
    select { cursor: pointer; }

    /* Checkboxes catégories */
    .check-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .check-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 2px solid var(--gris-border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .check-item:has(input:checked) { border-color: var(--accent); background: rgba(230,70,255,0.06); }
    .check-item input { accent-color: var(--accent); }

    /* Boutons du modal */
    .modal__footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--gris-border);
    }
    .btn-cancel {
      background: transparent;
      color: var(--noir);
      border: 2px solid var(--gris-border);
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 11px 22px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--noir); }
    .btn-save {
      background: var(--accent);
      color: var(--blanc);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 11px 28px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-save:hover { background: var(--accent-dark); }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--noir);
      color: var(--blanc);
      padding: 14px 24px;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: var(--vert); }
    #toast.error   { background: var(--rouge); }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--gris); }
    .empty-state p { font-size: 1.05rem; margin-top: 12px; }

    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
      .check-grid { grid-template-columns: repeat(2, 1fr); }
      .modal { padding: 24px 20px 28px; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <p class="login-logo">au <em>pestacle</em> ce soir</p>
    <h1 class="login-title">Espace admin</h1>
    <p class="login-sub">Entrez le mot de passe pour accéder au tableau de bord.</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" autocomplete="current-password">
    <button id="login-btn">Se connecter →</button>
    <p class="login-error" id="login-error">Mot de passe incorrect.</p>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard">

  <!-- Topbar -->
  <header class="topbar">
    <span class="topbar__logo">au pestacle ce soir</span>
    <div class="topbar__right">
      <span class="topbar__badge">Admin</span>
      <a href="/" style="color:rgba(255,255,255,0.75);font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;">← Voir le site</a>
      <button class="topbar__logout" id="logout-btn">Déconnexion</button>
    </div>
  </header>

  <!-- Contenu principal -->
  <div class="main">
    <div class="main__header">
      <div>
        <h1 class="main__title">Spectacles</h1>
        <p class="main__count" id="dash-count">Chargement…</p>
      </div>
      <button class="btn-add" id="btn-add">+ Ajouter un spectacle</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th></th>
            <th>Titre</th>
            <th>Lieu</th>
            <th>Dates</th>
            <th>Note</th>
            <th>Catégories</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="spectacles-tbody">
          <tr><td colspan="8" class="empty-state"><p>Chargement…</p></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ═══ MODAL AJOUTER / MODIFIER ═══ -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal__close" id="modal-close" aria-label="Fermer">×</button>
    <h2 class="modal__title" id="modal-title">Nouveau spectacle</h2>

    <form id="spec-form" novalidate>
      <input type="hidden" id="f-id">
      <div class="form-grid">

        <div class="form-group form-group--full">
          <label for="f-titre">Titre du spectacle *</label>
          <input type="text" id="f-titre" placeholder="Ex : Ménopause, le Musical" required>
        </div>

        <div class="form-group">
          <label for="f-lieu">Lieu / Salle *</label>
          <input type="text" id="f-lieu" placeholder="Apollo Théâtre, Paris 11e" required>
        </div>

        <div class="form-group">
          <label for="f-dates">Dates</label>
          <input type="text" id="f-dates" placeholder="3 juin — 9 août 2026">
        </div>

        <div class="form-group">
          <label for="f-duree">Durée</label>
          <input type="text" id="f-duree" placeholder="1h30 sans entracte">
        </div>

        <div class="form-group">
          <label for="f-note">Note d'Hélène</label>
          <select id="f-note">
            <option value="3">HHH — Coup de cœur absolu</option>
            <option value="2">HH — Très recommandé</option>
            <option value="1">H — Recommandé</option>
          </select>
        </div>

        <div class="form-group form-group--full">
          <label for="f-description">Description courte</label>
          <textarea id="f-description" placeholder="Ce que vous verrez, ce que vous ressentirez. 2-3 phrases max."></textarea>
        </div>

        <div class="form-group form-group--full">
          <label>Catégories humeur</label>
          <div class="check-grid">
            <label class="check-item"><input type="checkbox" name="cat" value="rire"> 😂 Pour rire</label>
            <label class="check-item"><input type="checkbox" name="cat" value="reflechir"> 🤔 Pour réfléchir</label>
            <label class="check-item"><input type="checkbox" name="cat" value="famille"> 👨‍👩‍👧 En famille</label>
            <label class="check-item"><input type="checkbox" name="cat" value="danse"> 💃 Pour la danse</label>
            <label class="check-item"><input type="checkbox" name="cat" value="amis"> 🎉 Entre amis</label>
            <label class="check-item"><input type="checkbox" name="cat" value="coeur"> ⭐ Coup de cœur</label>
          </div>
        </div>

        <div class="form-group">
          <label for="f-periode">Période</label>
          <select id="f-periode">
            <option value="urgent">⚡ Ce mois-ci</option>
            <option value="ete">☀️ Cet été</option>
            <option value="automne">🍂 Automne</option>
            <option value="hiver">❄️ Hiver</option>
            <option value="toute-annee">Toute l'année</option>
          </select>
        </div>

        <div class="form-group">
          <label for="f-emoji">Emoji illustration</label>
          <input type="text" id="f-emoji" placeholder="🎭" maxlength="4">
        </div>

        <div class="form-group">
          <label for="f-couleur">Couleur de fond</label>
          <select id="f-couleur">
            <option value="linear-gradient(135deg,#FFD0E8,#FF85B8)">Rose — comédie musicale</option>
            <option value="linear-gradient(135deg,#FFE8A0,#FF9F20)">Orange — énergie</option>
            <option value="linear-gradient(135deg,#E8F5DC,#C8E8A0)">Vert — danse</option>
            <option value="linear-gradient(135deg,#C8C0F0,#7860C8)">Violet — théâtre</option>
            <option value="linear-gradient(135deg,#A0D8F0,#1080C0)">Bleu — aventure</option>
            <option value="linear-gradient(135deg,#FFE0B0,#FF9940)">Ambre — stand-up</option>
            <option value="linear-gradient(135deg,#FFE8E8,#FFD0D0)">Rouge pâle — dramatique</option>
            <option value="linear-gradient(135deg,#FFFACC,#FFE880)">Jaune — famille</option>
            <option value="linear-gradient(135deg,#D8D8D8,#404040)">Gris — expo / photo</option>
            <option value="linear-gradient(135deg,#E0C0FF,#A050E0)">Lilas — magie</option>
          </select>
        </div>

        <div class="form-group">
          <label for="f-lien">Lien vers la fiche</label>
          <input type="text" id="f-lien" placeholder="spectacles/mon-spectacle.html ou https://...">
        </div>

        <div class="form-group">
          <label for="f-actif">Statut de publication</label>
          <select id="f-actif">
            <option value="true">✅ Publié — visible sur le site</option>
            <option value="false">⏸ Non publié — masqué</option>
          </select>
        </div>

      </div>

      <div class="modal__footer">
        <button type="button" class="btn-cancel" id="modal-cancel">Annuler</button>
        <button type="submit" class="btn-save">Enregistrer →</button>
      </div>
    </form>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════
   ADMIN JAVASCRIPT
══════════════════════════════════════════════════════ */

let spectacles = [];
let editingId  = null;

/* ── Auth ───────────────────────────────────────────── */
async function checkAuth() {
  const res  = await fetch('/admin/check');
  const data = await res.json();
  if (data.authenticated) showDashboard();
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const pwd = document.getElementById('pwd-input').value;
  const err = document.getElementById('login-error');
  const res = await fetch('/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pwd })
  });
  if (res.ok) {
    showDashboard();
  } else {
    err.style.display = 'block';
    document.getElementById('pwd-input').focus();
  }
});

document.getElementById('logout-btn').addEventListener('click', async () => {
  await fetch('/admin/logout', { method: 'POST' });
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
});

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadSpectacles();
}

/* ── CRUD ───────────────────────────────────────────── */
async function loadSpectacles() {
  const res = await fetch('/api/spectacles');
  spectacles = await res.json();
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('spectacles-tbody');
  const count = document.getElementById('dash-count');
  count.textContent = `${spectacles.length} spectacle${spectacles.length > 1 ? 's' : ''} au total`;

  if (!spectacles.length) {
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><p>Aucun spectacle pour l'instant.<br>Cliquez sur "+ Ajouter" pour commencer.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = spectacles.map(s => {
    const stars  = s.note >= 3 ? 'HHH' : s.note >= 2 ? 'HH' : 'H';
    const cats   = (s.categories || []).map(c => `<span class="cat-pill cat-pill--${c}">${c}</span>`).join('');
    const statut = s.actif !== false
      ? '<span class="td-statut td-statut--actif">● Publié</span>'
      : '<span class="td-statut td-statut--inactif">○ Masqué</span>';
    return `
      <tr>
        <td class="td-emoji">${s.emoji || '🎭'}</td>
        <td class="td-titre">${esc(s.titre)}</td>
        <td class="td-lieu">${esc(s.lieu)}</td>
        <td style="font-size:0.82rem;color:var(--gris)">${esc(s.dates || '—')}</td>
        <td class="td-note">${stars}</td>
        <td><div class="td-cats">${cats}</div></td>
        <td>${statut}</td>
        <td>
          <div class="td-actions">
            <button class="btn-edit" onclick="openEdit('${esc(s.id)}')">Modifier</button>
            <button class="btn-delete" onclick="deleteSpec('${esc(s.id)}', '${esc(s.titre)}')">Supprimer</button>
          </div>
        </td>
      </tr>`;
  }).join('');
}

async function deleteSpec(id, titre) {
  if (!confirm(`Supprimer "${titre}" ? Cette action est irréversible.`)) return;
  const res = await fetch(`/api/spectacles/${encodeURIComponent(id)}`, { method: 'DELETE' });
  if (res.ok) {
    showToast(`"${titre}" supprimé`, 'success');
    loadSpectacles();
  } else {
    showToast('Erreur lors de la suppression', 'error');
  }
}

/* ── Modal ──────────────────────────────────────────── */
function openAdd() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouveau spectacle';
  document.getElementById('spec-form').reset();
  document.getElementById('f-id').value = '';
  document.getElementById('f-note').value = '4';
  document.getElementById('f-periode').value = 'toute-annee';
  document.getElementById('f-couleur').value = 'linear-gradient(135deg,#FFD0E8,#FF85B8)';
  document.getElementById('f-actif').value = 'true';
  document.getElementById('f-emoji').value = '🎭';
  openModal();
}

function openEdit(id) {
  const s = spectacles.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Modifier le spectacle';
  document.getElementById('f-id').value          = s.id;
  document.getElementById('f-titre').value        = s.titre       || '';
  document.getElementById('f-lieu').value         = s.lieu        || '';
  document.getElementById('f-dates').value        = s.dates       || '';
  document.getElementById('f-duree').value        = s.duree       || '';
  document.getElementById('f-description').value  = s.description || '';
  document.getElementById('f-note').value         = String(s.note  || 4);
  document.getElementById('f-periode').value      = s.periode     || 'toute-annee';
  document.getElementById('f-emoji').value        = s.emoji       || '🎭';
  document.getElementById('f-couleur').value      = s.couleur     || '';
  document.getElementById('f-lien').value         = s.lien        || '';
  document.getElementById('f-actif').value        = String(s.actif !== false);
  // Catégories
  document.querySelectorAll('[name=cat]').forEach(cb => {
    cb.checked = (s.categories || []).includes(cb.value);
  });
  openModal();
}

function openModal()  { document.getElementById('modal-backdrop').classList.add('open'); }
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }

document.getElementById('btn-add').addEventListener('click', openAdd);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

document.getElementById('spec-form').addEventListener('submit', async e => {
  e.preventDefault();
  const cats = [...document.querySelectorAll('[name=cat]:checked')].map(cb => cb.value);
  const data = {
    titre:       document.getElementById('f-titre').value.trim(),
    lieu:        document.getElementById('f-lieu').value.trim(),
    dates:       document.getElementById('f-dates').value.trim(),
    duree:       document.getElementById('f-duree').value.trim(),
    description: document.getElementById('f-description').value.trim(),
    note:        Number(document.getElementById('f-note').value),
    categories:  cats,
    periode:     document.getElementById('f-periode').value,
    emoji:       document.getElementById('f-emoji').value.trim() || '🎭',
    couleur:     document.getElementById('f-couleur').value,
    lien:        document.getElementById('f-lien').value.trim(),
    actif:       document.getElementById('f-actif').value === 'true',
  };

  if (!data.titre || !data.lieu) {
    showToast('Titre et lieu sont obligatoires', 'error');
    return;
  }

  let res;
  if (editingId) {
    res = await fetch(`/api/spectacles/${encodeURIComponent(editingId)}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } else {
    /* Générer un ID depuis le titre */
    data.id = data.titre
      .toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '')
      .substring(0, 60);
    res = await fetch('/api/spectacles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  }

  if (res.ok) {
    closeModal();
    showToast(editingId ? 'Spectacle modifié ✓' : 'Spectacle ajouté ✓', 'success');
    loadSpectacles();
  } else {
    showToast('Erreur lors de la sauvegarde', 'error');
  }
});

/* ── Toast ──────────────────────────────────────────── */
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

/* ── Échapper HTML ──────────────────────────────────── */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Initialisation ─────────────────────────────────── */
checkAuth();
</script>
